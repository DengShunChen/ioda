# 測試配置檔案：allReduce minloc 功能測試
# 這個配置檔案用於測試 eckit::mpi::minloc() 操作的正確性

# 測試環境設定
test environment:
  test name: "AllReduce Minloc Test"
  description: "測試 MPI allReduce 的 minloc 操作功能"
  
# 時間窗口設定（測試需要）
time window:
  begin: 2020-01-01T00:00:00Z
  end: 2020-01-01T01:00:00Z

# 測試參數
test parameters:
  # 基本測試參數
  basic test:
    vector size: 3
    expected results:
      - distance: 1.0
        rank: 0
      - distance: 1.5
        rank: 1
      - distance: 1.2
        rank: 2
  
  # 無窮大值測試參數
  infinity test:
    vector size: 4
    infinity value: "inf"
    expected results:
      - distance: 2.0
        rank: 0
      - distance: 1.5
        rank: 1
      - distance: 1.0
        rank: 0
      - distance: 3.0
        rank: 1
  
  # 大向量測試參數
  large vector test:
    vector size: 1000
    infinity value: "inf"
    description: "模擬實際觀測數據的大向量測試"
  
  # 邊界情況測試參數
  edge cases test:
    vector size: 3
    same distance test: true
    expected results:
      - distance: 1.0
        rank: 0  # 相同距離時選擇較小排名
      - distance: 1.0
        rank: 0  # 相同距離時選擇較小排名
      - distance: 1.5
        rank: 1

# MPI 設定
mpi settings:
  min processes: 2
  max processes: 4
  description: "需要至少 2 個 MPI 進程來測試 allReduce 功能"

# 測試驗證標準
validation criteria:
  - "所有進程的 minloc 結果應該一致"
  - "距離值應該正確找到最小值"
  - "排名值應該對應到擁有最小距離的進程"
  - "無窮大值應該被正確處理"
  - "相同距離時應該選擇較小的排名"



